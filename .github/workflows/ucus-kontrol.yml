name: Ucus Fiyat Kontrolu

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  ucus-kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kutuphaneleri Yukle
        run: pip install requests
      - name: Ucus Fiyatlarini Kontrol Et
        env:
          AVIATION_KEY: ${{ secrets.AVIATION_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
        run: python ucus_alarm.py
