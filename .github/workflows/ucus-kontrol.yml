name: ✈️ Uçuş Fiyat Kontrolü

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  ucus-kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4
      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 📦 Kütüphaneleri Yükle
        run: pip install requests
      - name: ✈️ Uçuş Fiyatlarını Kontrol Et
        env:
          AVIATION_KEY: ${{ secrets.AVIATION_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ucus_alarm.py
